# Config-as-code for the backend-v2 Railway service (root directory =
# backend-v2/, so this file is picked up from here — isolated-monorepo
# pattern). Dashboard settings should stay empty; this file is the truth.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Relative to repo root: only Java changes redeploy this service.
watchPatterns = ["backend-v2/**"]

[deploy]
# Re-enabled after the PORT + IPv6 (::) binding fixes landed — if the probe
# still reports service-unavailable, that is a prober-side issue (bean q8ld
# has the forensic history) and this goes back to "".
healthcheckPath = "/q/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
