# Scoped to dev/test until the real pg_dump baseline lands — an accidental
# prod boot must NOT run the provisional probe migration against the shared DB.
%dev.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.migrate-at-start=true
# prod: Railway-style env vars; dev/test: Dev Services Postgres (Docker)
%prod.quarkus.datasource.jdbc.url=${DATABASE_JDBC_URL}
%prod.quarkus.datasource.username=${DATABASE_USERNAME:}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD:}

# ── Idempotency (bean 0o9b) ───────────────────────────────────────────────
# Completed write responses cached by (athlete, Idempotency-Key) so a retried
# write returns the first response instead of re-applying (closes the strangler
# 502-lost-response double-apply window). In-memory Caffeine now; swappable to a
# persistent backend (quarkus-redis-cache) later with no code change (the store
# is behind IdempotencyStore). Bounded + short TTL — client 5xx-retries are
# near-immediate, so a 24h/10k window is ample and cheap.
quarkus.cache.caffeine."idempotency".expire-after-write=24H
quarkus.cache.caffeine."idempotency".maximum-size=10000

# ── Write batching ────────────────────────────────────────────────────────
# The apply/rebuild cascade rewrites metrics_daily as one row per calendar day
# (1000+ over a multi-year history) plus per-activity TSS updates. Batch the
# INSERT/UPDATE statements so it's a handful of round-trips, not ~1000 — critical
# over the Supabase pooler where each statement is ~20-30ms (apply was 28s → 499;
# bean troh). MetricDaily has a composite natural key (no IDENTITY), so its
# inserts are batchable; reWriteBatchedInserts collapses each batch into one
# multi-row INSERT (the big pooler win). Output is identical — parity-safe.
quarkus.hibernate-orm.jdbc.statement-batch-size=500
quarkus.datasource.jdbc.additional-jdbc-properties.reWriteBatchedInserts=true

# ── LLM (LangChain4j / Anthropic) ─────────────────────────────────────────
# Nutrition race-day regen (bean fd31); plan/check-in ports reuse this model.
# api-key defaults empty — the app MUST boot without it (dev/test/parity and
# prod-before-key). NutritionLlm.available() gates the call and falls back to the
# deterministic plan when unset. model = FastAPI planner_model (claude-sonnet-4-6).
# The extension REJECTS an empty api-key at boot (config validation → the app
# won't start). So default to a non-empty sentinel "no-key" when ANTHROPIC_API_KEY
# is UNSET — the app boots, and NutritionLlm.available() treats the sentinel as
# "no key" → deterministic fallback. This is what lets prod deploy BEFORE the key
# is wired without the silent healthcheck-crash (bean backend-v2-railway-deploy).
# OPS CEILING: the ${VAR:default} default only applies when the var is ABSENT. A
# var that is PRESENT-but-EMPTY resolves to "" and WILL crash boot. On Railway,
# either set ANTHROPIC_API_KEY to a real value or leave it unset — never blank.
quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY:no-key}
# Tests NEVER use a real key (even if ANTHROPIC_API_KEY is exported in the shell):
# force the sentinel so available() is false → fallback, no network. The LLM
# success path is covered by mocking NutritionLlm (NutritionRegenerateTest).
%test.quarkus.langchain4j.anthropic.api-key=no-key
quarkus.langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-6
quarkus.langchain4j.anthropic.chat-model.max-tokens=4000
quarkus.langchain4j.timeout=60s

# ── Uploads ───────────────────────────────────────────────────────────────
# Strava GDPR export ZIPs can be large; the /api/strava/import handler enforces
# the real 2 GB ceiling (matches FastAPI MAX_UPLOAD_BYTES). Raise Quarkus's body
# limit above that so the handler's 413 is authoritative. Multipart uploads stream
# to disk (handle-file-uploads defaults on), so this is a disk, not heap, bound.
quarkus.http.limits.max-body-size=2100M

# ── Observability ─────────────────────────────────────────────────────────
# Access log: every request with status/duration — the FastAPI side logs all
# requests via uvicorn; parity matters when both serve the same clients.
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %r %s %b %{RESPONSE_TIME}ms
quarkus.log.category."io.gamov".level=INFO
%dev.quarkus.log.category."io.gamov".level=DEBUG

# ── Strava API client ─────────────────────────────────────────────────────
# The token-refresh + activity fetch client (bean wc60). Base host; the OAuth
# token endpoint and the v3 API share it. Tests override the URL to a WireMock.
quarkus.rest-client.strava.url=https://www.strava.com
# App credentials (Railway env STRAVA_CLIENT_ID / STRAVA_CLIENT_SECRET).
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}
# OAuth redirect URI (Strava sends the code here) + the SPA origin OAuth outcomes
# redirect back to. Same env vars FastAPI reads (config.py) so they stay in sync.
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:8000/api/strava/callback}
# The SPA origin OAuth outcomes redirect back to = FastAPI cors_origin_list[0].
# Default matches Settings.cors_origins so dev/test/parity redirect Locations agree.
strava.frontend-origin=${CORS_ORIGINS:http://localhost:5173}
# Test profile: fixed OAuth config so the connect redirect/URL is deterministic.
%test.strava.client-id=12345
%test.strava.client-secret=test-strava-secret
%test.strava.redirect-uri=http://localhost:8000/api/strava/callback
%test.strava.frontend-origin=http://localhost:5173
# Session cookie: Secure attribute (prod = https). Matches FastAPI COOKIE_SECURE.
irontrainer.cookie-secure=${COOKIE_SECURE:false}

# ── Auth ──────────────────────────────────────────────────────────────────
# Shared secret for verifying the itsdangerous-signed Starlette 'session'
# cookie (same SESSION_SECRET FastAPI signs with). backend-v2 only verifies;
# minting stays on the FastAPI Strava OAuth callback during the strangle window.
irontrainer.session-secret=${SESSION_SECRET:}
# Test profile signs/verifies cookies with a fixed secret (see SessionAuthTest).
%test.irontrainer.session-secret=test-secret-key
# Local/dev fallback athlete when auth is not required (FastAPI default_athlete_id).
irontrainer.default-athlete-id=${DEFAULT_ATHLETE_ID:1}
# Deployment mode (settings.auth_required): when true, the Strava callback enforces
# login (oauth_state CSRF check + allowlist) and mints an athlete_id session.
irontrainer.auth-required=${AUTH_REQUIRED:false}
# Strava allowlist (settings.allowed_strava_ids): comma-separated athlete ids that
# may log in; empty = allow all. Only consulted when auth-required.
irontrainer.allowed-strava-ids=${ALLOWED_STRAVA_IDS:}
# Test profiles pin local (non-auth) mode + an empty allowlist so a shell-exported
# AUTH_REQUIRED/ALLOWED_STRAVA_IDS can't perturb the QuarkusTest suite.
%test.irontrainer.auth-required=false
%test.irontrainer.allowed-strava-ids=

# ── Race defaults ─────────────────────────────────────────────────────────
# effective_race()'s no-race-selected fallback. Mapped to the SAME env vars
# FastAPI's Settings reads (config.py), with the same defaults, so an override
# desyncs neither backend.
irontrainer.race-name=${RACE_NAME:IRONMAN 70.3 New York}
irontrainer.race-date=${RACE_DATE:2026-09-26}
irontrainer.cutoff-swim-s=${CUTOFF_SWIM_S:4200}
irontrainer.cutoff-bike-s=${CUTOFF_BIKE_S:19800}
irontrainer.cutoff-finish-s=${CUTOFF_FINISH_S:30600}

# Bundle the export README into the native image (read by ExportResource).
quarkus.native.resources.includes=import_instructions.txt,META-INF/resources/**
