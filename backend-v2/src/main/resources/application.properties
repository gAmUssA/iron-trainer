# Scoped to dev/test until the real pg_dump baseline lands — an accidental
# prod boot must NOT run the provisional probe migration against the shared DB.
%dev.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.migrate-at-start=true
# prod: Railway-style env vars; dev/test: Dev Services Postgres (Docker)
%prod.quarkus.datasource.jdbc.url=${DATABASE_JDBC_URL}
%prod.quarkus.datasource.username=${DATABASE_USERNAME:}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD:}

# ── Write batching ────────────────────────────────────────────────────────
# The apply/rebuild cascade rewrites metrics_daily as one row per calendar day
# (1000+ over a multi-year history) plus per-activity TSS updates. Batch the
# INSERT/UPDATE statements so it's a handful of round-trips, not ~1000 — critical
# over the Supabase pooler where each statement is ~20-30ms (apply was 28s → 499;
# bean troh). MetricDaily has a composite natural key (no IDENTITY), so its
# inserts are batchable; reWriteBatchedInserts collapses each batch into one
# multi-row INSERT (the big pooler win). Output is identical — parity-safe.
quarkus.hibernate-orm.jdbc.statement-batch-size=500
quarkus.datasource.jdbc.additional-jdbc-properties.reWriteBatchedInserts=true

# ── Observability ─────────────────────────────────────────────────────────
# Access log: every request with status/duration — the FastAPI side logs all
# requests via uvicorn; parity matters when both serve the same clients.
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %r %s %b %{RESPONSE_TIME}ms
quarkus.log.category."io.gamov".level=INFO
%dev.quarkus.log.category."io.gamov".level=DEBUG

# ── Strava API client ─────────────────────────────────────────────────────
# The token-refresh + activity fetch client (bean wc60). Base host; the OAuth
# token endpoint and the v3 API share it. Tests override the URL to a WireMock.
quarkus.rest-client.strava.url=https://www.strava.com
# App credentials (Railway env STRAVA_CLIENT_ID / STRAVA_CLIENT_SECRET).
strava.client-id=${STRAVA_CLIENT_ID:}
strava.client-secret=${STRAVA_CLIENT_SECRET:}

# ── Auth ──────────────────────────────────────────────────────────────────
# Shared secret for verifying the itsdangerous-signed Starlette 'session'
# cookie (same SESSION_SECRET FastAPI signs with). backend-v2 only verifies;
# minting stays on the FastAPI Strava OAuth callback during the strangle window.
irontrainer.session-secret=${SESSION_SECRET:}
# Test profile signs/verifies cookies with a fixed secret (see SessionAuthTest).
%test.irontrainer.session-secret=test-secret-key
# Local/dev fallback athlete when auth is not required (FastAPI default_athlete_id).
irontrainer.default-athlete-id=${DEFAULT_ATHLETE_ID:1}

# ── Race defaults ─────────────────────────────────────────────────────────
# effective_race()'s no-race-selected fallback. Mapped to the SAME env vars
# FastAPI's Settings reads (config.py), with the same defaults, so an override
# desyncs neither backend.
irontrainer.race-name=${RACE_NAME:IRONMAN 70.3 New York}
irontrainer.race-date=${RACE_DATE:2026-09-26}
irontrainer.cutoff-swim-s=${CUTOFF_SWIM_S:4200}
irontrainer.cutoff-bike-s=${CUTOFF_BIKE_S:19800}
irontrainer.cutoff-finish-s=${CUTOFF_FINISH_S:30600}
