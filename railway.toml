# Sentinel for the retired FastAPI Railway service (`iron-trainer`, b9a5a044).
#
# The service is DECOMMISSIONED (bean foi1) but kept STOPPED — backend-v2
# references its vars (SESSION_SECRET), so the service must not be deleted. This
# is the only railway.toml the FastAPI service reads (the backend-v2 service is
# pinned to backend-v2/railway.toml). Its `watchPatterns` matches a path that
# never exists, so pushes to main never trigger a build/deploy for this dead
# service. Without it, Railway auto-builds it on every push and fails (no
# Dockerfile → railpack can't detect a build).
#
# Permanent fix (Railway UI, then this file can go): disconnect this service's
# GitHub source so it no longer auto-deploys at all.
[build]
watchPatterns = ["_decommissioned_never_matches_/**"]
