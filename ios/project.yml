# XcodeGen spec — run `xcodegen generate` in this folder to produce
# IronTrainer.xcodeproj, then open it in Xcode 16+ (iOS 18 SDK).
name: IronTrainer
options:
  bundleIdPrefix: io.gamov.irontrainer
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic  # enables agvtool for fastlane increment_build_number
    GENERATE_INFOPLIST_FILE: NO
    DEVELOPMENT_TEAM: "3ZMBGR95M8" # Viktor Gamov — device builds / TestFlight
targets:
  IronTrainer:
    type: application
    platform: iOS
    sources:
      - path: IronTrainer
    settings:
      base:
        INFOPLIST_FILE: IronTrainer/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: IronTrainer/Resources/IronTrainer.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: io.gamov.irontrainer.helper
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: WorkoutKit.framework
      - sdk: HealthKit.framework
    scheme:  # generate a *shared* scheme so fastlane/gym can find it
      testTargets: []
