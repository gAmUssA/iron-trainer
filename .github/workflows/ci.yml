name: CI

on:
  push:
  pull_request:

# The FastAPI `backend` (pytest) and `contract` (cross-impl HTTP suite) jobs were
# removed 2026-07-21 with the full FastAPI decommission (bean foi1) — backend-v2
# (Quarkus) is the source of truth and has its own gate in backend-v2.yml. This
# workflow now builds the web frontend.
jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
