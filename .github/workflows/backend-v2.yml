name: backend-v2

# Quarkus migration track. Paths-filtered so Java changes get their own gate
# without burning minutes on Python/web/iOS pushes. Dev Services uses the
# runner's Docker daemon for the Postgres testcontainer.
on:
  push:
    paths:
      - "backend-v2/**"
      - ".github/workflows/backend-v2.yml"
  pull_request:
    paths:
      - "backend-v2/**"
      - ".github/workflows/backend-v2.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: JVM tests (Dev Services Postgres)
        run: ./mvnw -B test

  native:
    # The last Phase 0-1 spike item: GraalVM native image builds in CI
    # (container build via Mandrel; ~have 16GB on ubuntu-latest runners).
    # Deliberately after `test` — no point burning native minutes on red code.
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend-v2
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: iron
          POSTGRES_DB: iron
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Native image build (tests already ran in the test job)
        run: ./mvnw -B package -Dnative -Dquarkus.native.container-build=true -DskipTests
      - name: Smoke-run the binary against Postgres
        env:
          DATABASE_JDBC_URL: jdbc:postgresql://localhost:5432/iron
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: iron
        run: |
          ls -lh target/*-runner
          code=0
          timeout 15 ./target/*-runner || code=$?
          # 124 = timeout killed a healthy running server; anything else
          # (including a clean instant exit) is a startup failure.
          test "$code" -eq 124
